services:
  auto-browser:
    build: .
    container_name: auto-browser
    init: true
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      AUTO_BROWSER_CREDENTIALS_PATH: /app/secrets/credentials.json
      MARKETPLACE_MONITOR_ADMIN_TOKEN: ${MARKETPLACE_MONITOR_ADMIN_TOKEN:-}
      MARKETPLACE_MONITOR_READONLY_TOKEN: ${MARKETPLACE_MONITOR_READONLY_TOKEN:-}
      MARKETPLACE_REMOTE_WORKER_TOKEN: ${MARKETPLACE_REMOTE_WORKER_TOKEN:-}
    ports:
      - "21435:21435"
    volumes:
      - ./artifacts:/app/artifacts
      - ./profiles:/app/profiles
      - ./secrets:/app/secrets
    command: ["npm", "run", "marketplace:home:serve", "--", "--host", "0.0.0.0", "--port", "21435"]

  auto-browser-staging:
    build: .
    container_name: auto-browser-staging
    init: true
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      AUTO_BROWSER_CREDENTIALS_PATH: /app/secrets/credentials.json
      MARKETPLACE_MONITOR_ADMIN_TOKEN: ${MARKETPLACE_STAGING_MONITOR_ADMIN_TOKEN:-}
      MARKETPLACE_MONITOR_READONLY_TOKEN: ${MARKETPLACE_STAGING_MONITOR_READONLY_TOKEN:-}
      MARKETPLACE_REMOTE_WORKER_TOKEN: ${MARKETPLACE_STAGING_WORKER_TOKEN:-}
    ports:
      - "21436:21435"
    volumes:
      - ./artifacts-staging:/app/artifacts
      - ./profiles-staging:/app/profiles
      - ./secrets-staging:/app/secrets
    command: ["npm", "run", "marketplace:home:serve", "--", "--host", "0.0.0.0", "--port", "21435"]
